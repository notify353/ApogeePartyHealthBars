name: Lua validation

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Parse add-on files
        run: for file in *.lua; do luac5.1 -p "$file"; done
      - name: Validate macro library
        run: lua5.1 tests/macro_library_spec.lua
      - name: Validate macro installer
        run: lua5.1 tests/macro_installer_spec.lua
      - name: Validate event router
        run: lua5.1 tests/event_router_spec.lua
      - name: Validate secure frame guards
        run: lua5.1 tests/secure_frames_spec.lua
      - name: Validate clickable buff reminders
        run: lua5.1 tests/buff_icon_clickability_spec.lua
      - name: Validate tracked-spell casting
        run: lua5.1 tests/spell_tracker_casting_spec.lua
      - name: Validate unit display target path
        run: lua5.1 tests/unit_display_spec.lua
      - name: Validate party buff definitions
        run: lua5.1 tests/party_buff_definitions_spec.lua
      - name: Validate self-buff families
        run: lua5.1 tests/self_buff_families_spec.lua
      - name: Validate full add-on lifecycle
        run: lua5.1 tests/addon_smoke_spec.lua
      - name: Validate source and TOC layout
        shell: pwsh
        run: ./scripts/validate-package.ps1
      - name: Validate release workflow safety
        shell: pwsh
        run: ./scripts/validate-release-workflow.ps1
      - name: Build and inspect installable ZIP
        shell: pwsh
        run: ./scripts/build-package.ps1 -OutputPath .release/ci-package.zip
      - name: Build with the production packager
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28 # v2.5.1
        with:
          args: -d -n "{package-name}-ci"
      - name: Inspect production-packager ZIP
        shell: pwsh
        run: |
          $zip = Get-ChildItem .release -File -Filter 'ApogeePartyHealthBars-ci.zip'
          if ($zip.Count -ne 1) { throw "Expected exactly one production-packager ZIP, found $($zip.Count)." }
          ./scripts/validate-package.ps1 -ArchivePath $zip.FullName
      - name: Check whitespace errors
        run: git diff --check
